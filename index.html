<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login - srisailam trip 🔥</title>
    <link rel="stylesheet" type="text/css" href="css/style.css" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body>
    <div class="login-container">
        <div class="login-box inner_border">
            <h1>vertex siris signa</h1>
            <h2 class="side_heading">Private Photo Gallery</h2>
            
            <form id="login-form">
                <div class="input-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" required placeholder="Enter your email">
                </div>
                
                <div class="input-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" required placeholder="Enter your password">
                </div>
                
                <button type="submit" class="login-button">Sign In</button>
                
                <div class="divider">
                    <span>OR</span>
                </div>
                
                <button type="button" id="google-login-btn" class="google-button">
                    <svg viewBox="0 0 24 24" width="20" height="20" xmlns="http://www.w3.org/2000/svg">
                        <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
                        <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
                        <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
                        <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
                    </svg>
                    Sign in with Google
                </button>
            </form>
            
            <p id="login-message" class="login-message"></p>
            
            <div style="text-align: center; margin-top: 20px;">
                <a href="gallery.html" class="etg_link">← Back to Gallery</a>
            </div>
        </div>
    </div>

    <!-- Firebase Integration -->
    <script type="module" src="firebase-init.js"></script>
    <script type="module">
        document.getElementById('login-form').addEventListener('submit', function(e) {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const msgEl = document.getElementById('login-message');
            
            msgEl.textContent = 'Signing in...';
            msgEl.style.color = '#38bdf8';
            
            // Wait for firebase to be attached to window
            const checkFirebase = setInterval(() => {
                if (window.firebase && window.firebase.auth) {
                    clearInterval(checkFirebase);
                    window.firebase.signInWithEmailAndPassword(window.firebase.auth, email, password)
                        .then((userCredential) => {
                            msgEl.textContent = 'Success! Redirecting...';
                            msgEl.style.color = '#4ade80';
                        })
                        .catch((error) => {
                            msgEl.textContent = error.message;
                            msgEl.style.color = '#ef4444';
                        });
                }
            }, 100);
        });

        // Google Login Logic
        document.getElementById('google-login-btn').addEventListener('click', function() {
            const msgEl = document.getElementById('login-message');
            msgEl.textContent = 'Opening Google Sign In...';
            msgEl.style.color = '#a855f7';

            const checkFirebaseGoogle = setInterval(() => {
                if (window.firebase && window.firebase.auth && window.firebase.GoogleAuthProvider) {
                    clearInterval(checkFirebaseGoogle);
                    const provider = new window.firebase.GoogleAuthProvider();
                    
                    window.firebase.signInWithPopup(window.firebase.auth, provider)
                        .then((result) => {
                            msgEl.textContent = 'Success! Redirecting...';
                            msgEl.style.color = '#4ade80';
                        })
                        .catch((error) => {
                            msgEl.textContent = error.message;
                            msgEl.style.color = '#ef4444';
                        });
                }
            }, 100);
        });
    </script>
</body>
</html>
